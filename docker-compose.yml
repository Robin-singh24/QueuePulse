version: '3.9'

services:

  api:
    build: .
    container_name: pulsequeue-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - postgres
      - redis
    volumes:
      - .:/app
  

  worker:
    build: .
    container_name: pulsequeue-worker
    command: python -m worker.consumer
    restart: on-failure
    depends_on:
      - kafka
      - postgres
      - redis
    volumes:
      - .:/app

  
  postgres:
    image: postgres:15
    container_name: pulsequeue-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: pulsequeue
    ports:
      - "5432:5432"
  

  redis:
    image: redis:7
    container_name: pulsequeue-redis
    ports:
      - "6379:6379"
  
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pulsequeue-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"


  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pulsequeue-kafka
    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    restart: on-failure


  prometheus:
    image: prom/prometheus
    container_name: pulsequeue-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - api

    restart: on-failure


  grafana:
    image: grafana/grafana
    container_name: pulsequeue-grafana

    ports:
      - "3000:3000"

    volumes:
      - grafana-storage:/var/lib/grafana

    depends_on:
      - prometheus

    restart: on-failure


volumes:
  grafana-storage: