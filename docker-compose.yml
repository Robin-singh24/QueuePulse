version: '3.9'

services:

  api:
    build: .
    container_name: pulsequeue-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - postgres
      - redis
    volumes:
      - .:/app
  

  worker:
    build: .
    container_name: pulsequeue-worker
    command: python -m worker.consumer
    restart: on-failure
    depends_on:
      - kafka
      - postgres
      - redis
    volumes:
      - .:/app

  
  postgres:
    image: postgres:15
    container_name: pulsequeue-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: pulsequeue
    ports:
      - "5432:5432"
  

  redis:
    image: redis:7
    container_name: pulsequeue-redis
    ports:
      - "6379:6379"
  
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pulsequeue-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"


  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pulsequeue-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
